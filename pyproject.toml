[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  "data/chroma_db",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.coverage.run]
branch = true
source = ["app"]
omit = [
  "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
